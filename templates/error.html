{% extends "base.html" %}

{% block title %}错误 - 品牌AI顾问{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h1>{{ error }}</h1>
        <p>抱歉，页面出现了问题</p>
        <a href="{{ url_for('index') }}" class="btn-back">返回首页</a>
    </div>
</div>

<style>
.error-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
}

.error-card {
    text-align: center;
    padding: 40px;
}

.error-icon {
    font-size: 5rem;
    margin-bottom: 20px;
}

.error-card h1 {
    color: #ff6b35;
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.error-card p {
    color: #888;
    margin-bottom: 30px;
}

.btn-back {
    display: inline-block;
    padding: 12px 32px;
    background: linear-gradient(135deg, #ff6b35, #f7c331);
    border-radius: 8px;
    color: #fff;
    text-decoration: none;
}
</style>
{% endblock %}
