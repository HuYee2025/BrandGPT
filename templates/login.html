{% extends "base.html" %}

{% block title %}登录 - 餐饮品牌AI顾问{% endblock %}

{% block content %}
<div class="login-page">
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo区域 -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="30" stroke="url(#logoGradient)" stroke-width="3"/>
                        <path d="M20 44V24L32 18L44 24V44L32 50L20 44Z" fill="url(#logoGradient)" opacity="0.3"/>
                        <path d="M20 24L32 18L44 24V44L32 50V30L20 24Z" stroke="url(#logoGradient)" stroke-width="2"/>
                        <circle cx="32" cy="34" r="6" fill="url(#logoGradient)"/>
                        <defs>
                            <linearGradient id="logoGradient" x1="0" y1="0" x2="64" y2="64">
                                <stop stop-color="#FF6B35"/>
                                <stop offset="1" stop-color="#F7C331"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>

            <!-- 标题 -->
            <div class="auth-header">
                <h1>餐饮品牌AI顾问</h1>
                <p>智能生成您的商业计划书</p>
            </div>

            <!-- 登录表单 -->
            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        用户名
                    </label>
                    <input type="text" id="username" name="username" required
                           placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        密码
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required
                               placeholder="请输入密码" autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        记住我
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <span>登录</span>
                    <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>

            <!-- 分割线 -->
            <div class="divider">
                <span>或</span>
            </div>

            <!-- 底部 -->
            <div class="auth-footer">
                <p>还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
            </div>

            <!-- 提示 -->
            <div class="auth-tip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                <span>登录后可配置AI模型并开始智能咨询</span>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.querySelector('.toggle-password');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.classList.add('active');
    } else {
        passwordInput.type = 'password';
        toggleBtn.classList.remove('active');
    }
}
</script>
{% endblock %}
