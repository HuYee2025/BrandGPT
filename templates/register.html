{% extends "base.html" %}

{% block title %}注册 - 餐饮品牌AI顾问{% endblock %}

{% block content %}
<div class="login-page">
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo区域 -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="22" stroke="#141412" stroke-width="2" fill="none"/>
                        <path d="M16 32V20L24 16L32 20V32L24 36V24L16 20V32Z" stroke="#141412" stroke-width="2" fill="none"/>
                        <circle cx="24" cy="26" r="4" fill="#141412"/>
                    </svg>
                </div>
            </div>

            <!-- 标题 -->
            <div class="auth-header">
                <h1>创建账号</h1>
                <p>开启您的餐饮创业之旅</p>
            </div>

            <!-- 注册表单 -->
            <form method="POST" action="{{ url_for('register') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        用户名
                    </label>
                    <input type="text" id="username" name="username" required
                           placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="email">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        邮箱
                    </label>
                    <input type="email" id="email" name="email" required
                           placeholder="请输入邮箱" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">
                        <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        密码
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required
                               placeholder="请输入密码（至少6位）" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="agree" required>
                        <span class="checkmark"></span>
                        <span>我同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <span>注册</span>
                    <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                </button>
            </form>

            <!-- 分割线 -->
            <div class="divider">
                <span>或</span>
            </div>

            <!-- 底部 -->
            <div class="auth-footer">
                <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
            </div>

            <!-- 提示 -->
            <div class="auth-tip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                <span>注册后可配置AI模型并开始智能咨询</span>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.querySelector('.toggle-password');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.classList.add('active');
    } else {
        passwordInput.type = 'password';
        toggleBtn.classList.remove('active');
    }
}
</script>
{% endblock %}
