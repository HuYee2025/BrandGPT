<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复利计算器 - 利滚利的威力</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{max-width:620px;width:100%;background:#fff;border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .header{text-align:center;padding-bottom:20px;border-bottom:1px solid #E2E8F0;margin-bottom:20px}
    .header h1{font-size:24px;font-weight:600;color:#1E293B;margin-bottom:4px}
    .header p{font-size:13px;color:#64748B}
    .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
    .control-group{display:flex;flex-direction:column;gap:6px}
    .control-group label{font-size:12px;color:#64748B;font-weight:500}
    .control-group input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:#E2E8F0;border-radius:3px;outline:none;cursor:pointer}
    .control-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#667eea;border-radius:50%;cursor:pointer;box-shadow:0 2px 6px rgba(102,126,234,0.4)}
    .control-group .value{font-size:18px;font-weight:600;color:#667eea;text-align:center}
    .chart-wrap{position:relative;height:260px;margin-bottom:20px;background:#F8FAFC;border-radius:12px;padding:16px}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
    .metric{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:14px 10px;text-align:center}
    .metric .label{font-size:11px;color:#64748B;margin-bottom:6px}
    .metric .val{font-size:16px;font-weight:600;color:#1E293B}
    .metric.green{background:#ECFDF5;border-color:#A7F3D0}
    .metric.green .val{color:#059669}
    .metric.amber{background:#FFFBEB;border-color:#FDE68A}
    .metric.amber .val{color:#D97706}
    .metric.rose{background:#FEF2F2;border-color:#FECACA}
    .metric.rose .val{color:#E11D48}
    .formula{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:10px;padding:16px;text-align:center;color:#fff;font-size:13px;line-height:1.8}
    .formula strong{font-size:15px}
    .formula sup{font-size:11px;opacity:0.9}
    @media(max-width:560px){
      .controls{grid-template-columns:1fr}
      .metrics{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>复利计算器</h1>
      <p>本金 + 利息 × 利率，时间越长威力越大</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>本金 (万元)</label>
        <input type="range" id="principal" min="1" max="100" value="10" oninput="update()">
        <div class="value" id="vPrincipal">10</div>
      </div>
      <div class="control-group">
        <label>年利率 (%)</label>
        <input type="range" id="rate" min="1" max="20" value="8" oninput="update()">
        <div class="value" id="vRate">8%</div>
      </div>
      <div class="control-group">
        <label>年数</label>
        <input type="range" id="years" min="1" max="40" value="20" oninput="update()">
        <div class="value" id="vYears">20年</div>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="c"></canvas>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="label">本金</div>
        <div class="val" id="mPrincipal">10万</div>
      </div>
      <div class="metric amber">
        <div class="label">单利总额</div>
        <div class="val" id="mSimple">26万</div>
      </div>
      <div class="metric green">
        <div class="label">复利总额</div>
        <div class="val" id="mCompound">46.6万</div>
      </div>
      <div class="metric rose">
        <div class="label">利息差</div>
        <div class="val" id="mDiff">20.6万</div>
      </div>
    </div>

    <div class="formula">
      复利公式: <strong>A = P(1+r)<sup>t</sup></strong>
      &nbsp;&nbsp;|&nbsp;&nbsp; 单利: <strong>A = P(1+rt)</strong>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" onload="init()"></script>
  <script>
    var chart;
    function init(){buildChart();update();}
    if(window.Chart)init();

    function buildChart(){
      chart=new Chart(document.getElementById('c'),{
        type:'line',
        data:{labels:[],datasets:[
          {label:'复利',data:[],borderColor:'#059669',backgroundColor:'rgba(5,150,105,0.1)',fill:true,tension:0.4,borderWidth:3,pointRadius:0,pointHoverRadius:5},
          {label:'单利',data:[],borderColor:'#D97706',backgroundColor:'rgba(217,119,6,0.08)',fill:true,tension:0.4,borderWidth:2,borderDash:[6,4],pointRadius:0,pointHoverRadius:5}
        ]},
        options:{
          responsive:true,
          maintainAspectRatio:false,
          interaction:{intersect:false,mode:'index'},
          plugins:{
            legend:{
              display:true,
              position:'top',
              labels:{font:{size:12},boxWidth:14,padding:16,usePointStyle:true}
            }
          },
          scales:{
            y:{
              grid:{color:'rgba(0,0,0,0.05)'},
              ticks:{font:{size:11},callback:function(v){return v+'万'}},
              beginAtZero:true
            },
            x:{
              grid:{display:false},
              ticks:{font:{size:10}}
            }
          }
        }
      });
    }

    function calc(p,r,t){
      var simple=[],compound=[],labels=[];
      for(var i=0;i<=t;i++){
        labels.push(i+'年');
        simple.push(Math.round(p*(1+r*i/100)*100)/100);
        compound.push(Math.round(p*Math.pow(1+r/100,i)*100)/100);
      }
      return{labels:labels,simple:simple,compound:compound};
    }

    function update(){
      var p=+document.getElementById('principal').value;
      var r=+document.getElementById('rate').value;
      var t=+document.getElementById('years').value;

      document.getElementById('vPrincipal').textContent=p;
      document.getElementById('vRate').textContent=r+'%';
      document.getElementById('vYears').textContent=t+'年';

      var d=calc(p,r,t);
      chart.data.labels=d.labels;
      chart.data.datasets[0].data=d.compound;
      chart.data.datasets[1].data=d.simple;
      chart.update();

      var lastC=d.compound[d.compound.length-1];
      var lastS=d.simple[d.simple.length-1];

      document.getElementById('mPrincipal').textContent=p+'万';
      document.getElementById('mSimple').textContent=lastS+'万';
      document.getElementById('mCompound').textContent=lastC+'万';
      document.getElementById('mDiff').textContent=Math.round((lastC-lastS)*100)/100+'万';
    }
  </script>
</body>
</html>
