<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程语言流行度</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bar-label {
            width: 100px;
            font-weight: 500;
            color: #333;
        }
        .bar-wrapper {
            flex: 1;
            height: 32px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>2024年编程语言流行度排名</h1>
        <div class="bar-chart" id="chart"></div>
    </div>
    <script>
        const data = [
            { name: 'Python', value: 100, color: '#3776AB' },
            { name: 'JavaScript', value: 95, color: '#F7DF1E' },
            { name: 'Java', value: 88, color: '#ED8B00' },
            { name: 'C++', value: 85, color: '#00599C' },
            { name: 'C#', value: 82, color: '#239120' },
            { name: 'Go', value: 78, color: '#00ADD8' },
            { name: 'Rust', value: 75, color: '#DEA584' },
            { name: 'TypeScript', value: 72, color: '#3178C6' },
            { name: 'Swift', value: 68, color: '#FA7343' },
            { name: 'Kotlin', value: 65, color: '#7F52FF' }
        ];

        const chart = document.getElementById('chart');
        data.forEach(item => {
            const bar = document.createElement('div');
            bar.className = 'bar-item';
            bar.innerHTML = `
                <div class="bar-label">${item.name}</div>
                <div class="bar-wrapper">
                    <div class="bar-fill" style="width: 0%; background-color: ${item.color}; color: ${item.name === 'JavaScript' ? '#333' : 'white'}">
                        ${item.value}
                    </div>
                </div>
            `;
            chart.appendChild(bar);
            setTimeout(() => {
                bar.querySelector('.bar-fill').style.width = item.value + '%';
            }, 100);
        });
    </script>
</body>
</html>
